      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('codraze-theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.classList.remove('dark', 'light');
            document.documentElement.classList.add(t);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
